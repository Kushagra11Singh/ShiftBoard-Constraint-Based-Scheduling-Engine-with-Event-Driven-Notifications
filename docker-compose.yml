version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: shiftboard-postgres
    environment:
      POSTGRES_USER: shiftboard
      POSTGRES_PASSWORD: shiftboard123
      POSTGRES_DB: shiftboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shiftboard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shiftboard-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  scheduling-service:
    build:
      context: ./scheduling-service
      dockerfile: Dockerfile
    container_name: shiftboard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://shiftboard:shiftboard123@postgres:5432/shiftboard
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: shift-events
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: shiftboard-notifications
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_GROUP: notification-group
      KAFKA_TOPIC: shift-events
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  worker-service:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    container_name: shiftboard-worker
    ports:
      - "8002:8002"
    environment:
      SCHEDULING_SERVICE_URL: http://scheduling-service:8000
      WORKER_INTERVAL_SECONDS: "60"
    depends_on:
      - scheduling-service
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: shiftboard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres_data:
