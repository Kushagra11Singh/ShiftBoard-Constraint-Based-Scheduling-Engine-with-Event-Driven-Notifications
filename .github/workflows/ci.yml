name: ShiftBoard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-scheduling-service:
    name: Test Scheduling Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shiftboard
          POSTGRES_PASSWORD: shiftboard123
          POSTGRES_DB: shiftboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scheduling-service/requirements.txt

      - name: Install dependencies
        working-directory: scheduling-service
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: scheduling-service
        env:
          DATABASE_URL: postgresql://shiftboard:shiftboard123@localhost:5432/shiftboard_test
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: scheduling-service
        env:
          TEST_DATABASE_URL: postgresql://shiftboard:shiftboard123@localhost:5432/shiftboard_test
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_TOPIC: shift-events
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=89

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: notification-service/requirements.txt
      - name: Install dependencies
        working-directory: notification-service
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: notification-service
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_CONSUMER_GROUP: test-group
          KAFKA_TOPIC: shift-events
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  test-worker-service:
    name: Test Worker Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker-service/requirements.txt
      - name: Install dependencies
        working-directory: worker-service
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: worker-service
        env:
          SCHEDULING_SERVICE_URL: http://localhost:8000
          WORKER_INTERVAL_SECONDS: "60"
        run: pytest tests/ -v --cov=app --cov-report=term-missing
